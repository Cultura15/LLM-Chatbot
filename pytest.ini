[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

markers =
    unit: Unit tests that test individual functions/methods
    integration: Integration tests that test multiple components together

# Ignore paths
norecursedirs =
    .git
    .planning
    __pycache__
    .venv
    venv
